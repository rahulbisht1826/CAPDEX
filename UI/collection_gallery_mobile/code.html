<!-- Micro-interaction Script -->
<script>
        // Simple scroll effect for the header
        window.addEventListener('scroll', () => {
            const header = document.querySelector('header');
            if (window.scrollY > 20) {
                header.classList.add('shadow-md');
                header.classList.remove('border-white/40');
                header.classList.add('border-white/10');
            } else {
                header.classList.remove('shadow-md');
                header.classList.add('border-white/40');
                header.classList.remove('border-white/10');
            }
        });

        // Add active states to filters
        const filterButtons = document.querySelectorAll('.flex-shrink-0');
        filterButtons.forEach(btn => {
            btn.addEventListener('click', () => {
                filterButtons.forEach(b => {
                    b.classList.remove('bg-primary-container', 'text-on-primary-container');
                    b.classList.add('bg-surface-container-highest', 'text-on-surface-variant');
                });
                btn.classList.remove('bg-surface-container-highest', 'text-on-surface-variant');
                btn.classList.add('bg-primary-container', 'text-on-primary-container');
            });
        });
    </script>
